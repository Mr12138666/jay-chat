# ============================================
# MyBatis 配置
# ============================================
mybatis:
  mapper-locations: classpath:mappers/*.xml
  type-aliases-package: com.sunrisejay.jaychat

# ============================================
# Web 服务器配置
# ============================================
server:
  port: 8080

# ============================================
# Spring 配置
# ============================================
spring:
  # 文件上传配置
  servlet:
    multipart:
      # 单个文件最大大小（20MB）
      max-file-size: 20MB
      # 整个请求最大大小（25MB，需要大于单个文件大小）
      max-request-size: 25MB
      # 文件写入磁盘的阈值（超过此大小会写入临时文件）
      file-size-threshold: 2MB

  # 激活的配置文件（默认激活local）
  profiles:
    active: prod

# ============================================
# JWT 配置
# ============================================
jaychat:
  jwt:
    secret: ChangeThisSecretToSomethingSecure
    expire-seconds: 604800

# ============================================
# SpringDoc OpenAPI 配置
# ============================================
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

# ============================================
# 日志配置
# ============================================
logging:
  level:
    com.sunrisejay.jaychat: INFO
    org.springframework.web: WARN
    org.mybatis: DEBUG
    org.springframework.ai.chat.client.advisor: debug
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
