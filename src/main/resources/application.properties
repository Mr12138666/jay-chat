# ============================================
# MyBatis 配置
# ============================================
mybatis.mapper-locations=classpath:mappers/*.xml
mybatis.type-aliases-package=com.sunrisejay.jaychat

# ============================================
# Web 服务器配置
# ============================================
server.port=8080

# ============================================
# 数据源配置（生产环境）
# ============================================
spring.datasource.url=jdbc:mysql://120.53.242.78:3306/jay_chat?useSSL=false&serverTimezone=UTC&characterEncoding=utf8
spring.datasource.username=root
spring.datasource.password=123123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================
# JWT 配置
# ============================================
jaychat.jwt.secret=ChangeThisSecretToSomethingSecure
jaychat.jwt.expire-seconds=604800

# ============================================
# Swagger2 + Knife4j 文档配置
# ============================================
knife4j.enable=true
spring.mvc.pathmatch.matching-strategy=ANT_PATH_MATCHER

# ============================================
# 日志配置
# ============================================
logging.level.com.sunrisejay.jaychat=INFO
logging.level.org.springframework.web=WARN
logging.level.org.mybatis=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
