# ============================================
# MyBatis ??
# ============================================
mybatis.mapper-locations=classpath:mappers/*.xml
mybatis.type-aliases-package=com.sunrisejay.jaychat

# ============================================
# Web ?????
# ============================================
server.port=8080

# ============================================
# 文件上传配置
# ============================================
# 单个文件最大大小（20MB）
spring.servlet.multipart.max-file-size=20MB
# 整个请求最大大小（25MB，需要大于单个文件大小）
spring.servlet.multipart.max-request-size=25MB
# 文件写入磁盘的阈值（超过此大小会写入临时文件）
spring.servlet.multipart.file-size-threshold=2MB

# ============================================
# ??????????????????????
# ============================================
spring.datasource.url=jdbc:mysql://120.53.242.78:3306/jay_chat?useSSL=false&serverTimezone=UTC&characterEncoding=utf8&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=123123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================
# JWT ???????????????????
# ============================================
jaychat.jwt.secret=ChangeThisSecretToSomethingSecure
jaychat.jwt.expire-seconds=604800

# ============================================
# Swagger2 + Knife4j ????
# ============================================
knife4j.enable=true
spring.mvc.pathmatch.matching-strategy=ANT_PATH_MATCHER

# ============================================
# ????
# ============================================
logging.level.com.sunrisejay.jaychat=INFO
logging.level.org.springframework.web=WARN
logging.level.org.mybatis=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

