version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: jay-chat-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/jay_chat?useSSL=false&serverTimezone=UTC&characterEncoding=utf8
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=${MYSQL_PASSWORD:-123123}
      - JAYCHAT_JWT_SECRET=${JWT_SECRET:-ChangeThisSecretToSomethingSecure}
    depends_on:
      - mysql
    networks:
      - jay-chat-network
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        - VITE_API_BASE_URL=${API_BASE_URL:-http://your-server-ip:8080}
    container_name: jay-chat-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - jay-chat-network
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    container_name: jay-chat-mysql
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_PASSWORD:-123123}
      - MYSQL_DATABASE=jay_chat
    volumes:
      - mysql-data:/var/lib/mysql
      - ./database/init_tables.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "3306:3306"
    networks:
      - jay-chat-network
    restart: unless-stopped
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

networks:
  jay-chat-network:
    driver: bridge

volumes:
  mysql-data:
